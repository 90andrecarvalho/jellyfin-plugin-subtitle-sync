<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 288" width="512" height="288">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>

  <!-- Full background -->
  <rect width="512" height="288" fill="url(#bg)"/>

  <!-- Centered icon group -->
  <g transform="translate(256, 144)">
    <!-- Subtitle text bars (left of center) -->
    <rect x="-76" y="-42" width="80" height="12" rx="6" fill="rgba(255,255,255,0.9)"/>
    <rect x="-76" y="-22" width="56" height="12" rx="6" fill="rgba(255,255,255,0.55)"/>

    <rect x="-76" y="14" width="80" height="12" rx="6" fill="rgba(255,255,255,0.9)"/>
    <rect x="-76" y="34" width="56" height="12" rx="6" fill="rgba(255,255,255,0.55)"/>

    <!-- Circular sync arrow (right of center) -->
    <g transform="translate(48, 0)" fill="none" stroke="rgba(255,255,255,0.95)" stroke-width="5" stroke-linecap="round">
      <path d="M 0,-28 A 28,28 0 0,1 24.2,14"/>
      <path d="M 0,28 A 28,28 0 0,1 -24.2,-14"/>
      <polygon points="24.2,14 14,10 18.5,20" fill="rgba(255,255,255,0.95)" stroke="none"/>
      <polygon points="-24.2,-14 -14,-10 -18.5,-20" fill="rgba(255,255,255,0.95)" stroke="none"/>
    </g>
  </g>
</svg>
